// ─── Claude Export Parser ─────────────────────────────────────────────
const parseClaudeExport = (jsonData) => {
  const entries = [];
  const conversations = Array.isArray(jsonData) ? jsonData : jsonData?.conversations || jsonData?.chat_messages || [];

  for (const conv of conversations) {
    const id = conv.uuid || conv.id || conv.conversation_id || `import_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const title = conv.name || conv.title || "Untitled Chat";
    const messages = conv.chat_messages || conv.messages || conv.mapping ? Object.values(conv.mapping || {}).filter(m => m?.message).map(m => m.message) : [];

    let chatLog = "";
    if (conv.chat_messages) {
      chatLog = conv.chat_messages
        .map((m) => {
          const sender = m.sender === "human" ? "You" : "Claude";
          const text = typeof m.text === "string" ? m.text : Array.isArray(m.content) ? m.content.map(c => c.text || "").join("") : m.text?.toString() || "";
          return `**${sender}:**\n${text}`;
        })
        .join("\n\n---\n\n");
    } else if (conv.messages) {
      chatLog = conv.messages
        .map((m) => {
          const sender = m.role === "user" || m.role === "human" ? "You" : "Claude";
          const text = typeof m.content === "string" ? m.content : Array.isArray(m.content) ? m.content.map(c => c.text || "").join("") : "";
          return `**${sender}:**\n${text}`;
        })
        .join("\n\n---\n\n");
    }

    const createdAt = conv.created_at || conv.create_time ? new Date(conv.created_at || conv.create_time * 1000).toISOString() : new Date().toISOString();
    const updatedAt = conv.updated_at || conv.update_time ? new Date(conv.updated_at || conv.update_time * 1000).toISOString() : createdAt;
    const summary = conv.summary || "";

    entries.push(createEntry({
      id: `claude_${id}`,
      title,
      chatLog,
      chatImportId: id,
      createdAt,
      updatedAt,
      summary,
      notes: summary ? "" : `Imported from Claude on ${new Date().toLocaleDateString()}`,
    }));
  }
  return entries;
};

// ─── Tag Input Component ──────────────────────────────────────────────
const TagInput = ({ tags, allTags, onChange, theme }) => {
  const [input, setInput] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(false);
  const t = themes[theme];

  const suggestions = allTags.filter(
    (tag) => tag.toLowerCase().includes(input.toLowerCase()) && !tags.includes(tag)
  ).slice(0, 5);

  const addTag = (tag) => {
    const trimmed = tag.trim();
    if (trimmed && !tags.includes(trimmed)) {
      onChange([...tags, trimmed]);
    }
    setInput("");
    setShowSuggestions(false);
  };

  return (
    <div style={{ position: "relative" }}>
      <div style={{
        display: "flex", flexWrap: "wrap", gap: 6, padding: "8px 10px",
        border: `1px solid ${t.border}`, borderRadius: 8, background: t.bgSecondary,
        minHeight: 40, alignItems: "center",
      }}>
        {tags.map((tag) => (
          <span key={tag} style={{
            display: "inline-flex", alignItems: "center", gap: 4,
            padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 500,
            background: t.accentLight, color: t.accent,
            fontFamily: "'DM Sans', sans-serif",
          }}>
            {tag}
            <span onClick={() => onChange(tags.filter((tt) => tt !== tag))} style={{ cursor: "pointer", opacity: 0.7, marginLeft: 2 }}>&times;</span>
          </span>
        ))}
        <input
          value={input}
          onChange={(e) => { setInput(e.target.value); setShowSuggestions(true); }}
          onKeyDown={(e) => {
            if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addTag(input); }
            if (e.key === "Backspace" && !input && tags.length) { onChange(tags.slice(0, -1)); }
          }}
          onFocus={() => setShowSuggestions(true)}
          onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
          placeholder={tags.length ? "" : "Add tags..."}
          style={{
            border: "none", outline: "none", background: "transparent", flex: 1, minWidth: 80,
            fontSize: 13, color: t.text, fontFamily: "'DM Sans', sans-serif",
          }}
        />
      </div>
      {showSuggestions && suggestions.length > 0 && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10,
          background: t.bgSecondary, border: `1px solid ${t.border}`, borderRadius: 8,
          marginTop: 4, boxShadow: t.shadow, overflow: "hidden",
        }}>
          {suggestions.map((s) => (
            <div key={s} onMouseDown={() => addTag(s)} style={{
              padding: "8px 12px", fontSize: 13, color: t.text, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
            }}>{s}</div>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── Stage Picker ─────────────────────────────────────────────────────
const StagePicker = ({ value, onChange, theme }) => {
  const t = themes[theme];
  const getStageStyle = (stage) => {
    if (stage === "Done") return { bg: t.stageDone, color: t.stageDoneText };
    if (stage === "Seed") return { bg: t.stageSeed, color: t.text };
    if (stage === "Draft") return { bg: t.stageDraft, color: t.text };
    return { bg: t.stageRev, color: t.text };
  };

  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
      {STAGES.map((stage) => {
        const s = getStageStyle(stage);
        const active = value === stage;
        return (
          <button key={stage} onClick={() => onChange(stage)} style={{
            padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: active ? 600 : 400,
            fontFamily: "'DM Sans', sans-serif", border: active ? `2px solid ${t.accent}` : `1px solid ${t.borderLight}`,
            background: active ? s.bg : "transparent", color: active ? s.color : t.textMuted,
            cursor: "pointer", transition: "all 0.15s ease",
          }}>{stage}</button>
        );
      })}
    </div>
  );
};

// ─── Entry Card ───────────────────────────────────────────────────────
const EntryCard = ({ entry, onClick, viewMode, theme, batchMode, isSelected, onToggleSelect }) => {
  const t = themes[theme];
  const getStageColor = (stage) => {
    if (stage === "Done") return { bg: t.stageDone, color: t.stageDoneText };
    if (stage === "Seed") return { bg: t.stageSeed, color: t.text };
    if (stage === "Draft") return { bg: t.stageDraft, color: t.text };
    return { bg: t.stageRev, color: t.text };
  };
  const sc = getStageColor(entry.stage);
  const isGrid = viewMode === "grid";
  const typeIcon = entry.type === "Comedy Bit" ? Icons.mic : Icons.music;

  return (
    <div onClick={() => batchMode ? onToggleSelect(entry.id) : onClick()} style={{
      background: isSelected ? t.accentLight : t.cardBg, borderRadius: 12,
      border: isSelected ? `2px solid ${t.accent}` : `1px solid ${t.borderLight}`,
      padding: isGrid ? "18px" : "14px 18px", cursor: "pointer",
      boxShadow: t.shadow, transition: "all 0.2s ease",
      display: isGrid ? "flex" : "flex", flexDirection: isGrid ? "column" : "row",
      gap: isGrid ? 10 : 14, alignItems: isGrid ? "stretch" : "center",
    }}
      onMouseEnter={(e) => { if (!isSelected) { e.currentTarget.style.boxShadow = t.shadowHover; e.currentTarget.style.borderColor = t.accent + "40"; } }}
      onMouseLeave={(e) => { if (!isSelected) { e.currentTarget.style.boxShadow = t.shadow; e.currentTarget.style.borderColor = t.borderLight; } }}
    >
      {batchMode && (
        <div style={{
          width: 20, height: 20, borderRadius: 4, flexShrink: 0,
          border: isSelected ? `2px solid ${t.accent}` : `2px solid ${t.border}`,
          background: isSelected ? t.accent : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center",
          alignSelf: "center",
        }}>
          {isSelected && Icons.check({ size: 13, color: "#fff" })}
        </div>
      )}
      <div style={{
        width: 40, height: 40, borderRadius: 10, flexShrink: 0,
        background: t.accentLight, display: "flex", alignItems: "center", justifyContent: "center",
        overflow: "visible",
      }}>
        {typeIcon({ size: 18, color: t.accent })}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700,
          color: t.text, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis",
          whiteSpace: "nowrap",
        }}>{entry.title || "Untitled"}</div>
        {entry.summary && (
          <div style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: t.textSecondary,
            marginBottom: 6, lineHeight: 1.4, overflow: "hidden", textOverflow: "ellipsis",
            display: "-webkit-box", WebkitLineClamp: isGrid ? 2 : 1, WebkitBoxOrient: "vertical",
          }}>{cleanSummary(entry.summary).slice(0, 200)}</div>
        )}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" }}>
          <span style={{
            padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 600,
            background: sc.bg, color: sc.color, fontFamily: "'DM Sans', sans-serif",
          }}>{entry.stage}</span>
          {entry.tags.slice(0, isGrid ? 2 : 4).map((tag) => (
            <span key={tag} style={{
              padding: "2px 7px", borderRadius: 5, fontSize: 10, fontWeight: 500,
              background: t.tagBg, color: t.tagText, fontFamily: "'DM Sans', sans-serif",
            }}>{tag}</span>
          ))}
          {entry.tags.length > (isGrid ? 2 : 4) && (
            <span style={{ fontSize: 10, color: t.textMuted, fontFamily: "'DM Sans', sans-serif" }}>
              +{entry.tags.length - (isGrid ? 2 : 4)}
            </span>
          )}
        </div>
      </div>
      {entry.revisions.length > 0 && (
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: t.textMuted,
          display: "flex", alignItems: "center", gap: 3, flexShrink: 0,
        }}>
          {Icons.clock({ size: 11 })} {entry.revisions.length} rev{entry.revisions.length > 1 ? "s" : ""}
        </div>
      )}
      {entry.lastWorkedOn && (
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: t.textMuted,
          display: "flex", alignItems: "center", gap: 3, flexShrink: 0,
        }}>
          {Icons.edit({ size: 11 })} {new Date(entry.lastWorkedOn).toLocaleDateString()}
        </div>
      )}
    </div>
  );
};

// ─── Import Modal ─────────────────────────────────────────────────────
const ImportModal = ({ onImport, onClose, theme }) => {
  const [status, setStatus] = useState("idle");
  const [preview, setPreview] = useState(null);
  const fileRef = useRef();
  const t = themes[theme];

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus("parsing");
    try {
      const text = await file.text();
      const json = JSON.parse(text);
      const entries = parseClaudeExport(json);
      setPreview(entries);
      setStatus("preview");
    } catch (err) {
      setStatus("error");
    }
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center",
      background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)", padding: 20,
    }}>
      <div style={{
        background: t.bgSecondary, borderRadius: 16, padding: "32px", maxWidth: 520, width: "100%",
        boxShadow: t.shadowModal,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{
            fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700,
            color: t.text, margin: 0,
          }}>Import Claude Chats</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer" }}>
            {Icons.x({ size: 18 })}
          </button>
        </div>

        {status === "idle" && (
          <div>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: t.textSecondary, lineHeight: 1.6, marginBottom: 16 }}>
              Upload the JSON file from your Claude data export. Go to claude.ai &rarr; Settings &rarr; Privacy &rarr; Export Data, then extract the ZIP and find the conversations JSON file inside.
            </p>
            <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{ display: "none" }} />
            <button onClick={() => fileRef.current?.click()} style={{
              width: "100%", padding: "16px", borderRadius: 10, border: `2px dashed ${t.border}`,
              background: t.bg, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
              fontSize: 14, fontWeight: 500, color: t.textSecondary,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
              {Icons.upload({ size: 18 })} Choose JSON file
            </button>
          </div>
        )}

        {status === "parsing" && (
          <div style={{ textAlign: "center", padding: 30, color: t.textSecondary, fontFamily: "'DM Sans', sans-serif" }}>
            Parsing your conversations...
          </div>
        )}

        {status === "error" && (
          <div>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#C44", marginBottom: 16 }}>
              Couldn't parse that file. Make sure it's the JSON file from your Claude export (not the ZIP itself).
            </p>
            <button onClick={() => { setStatus("idle"); setPreview(null); }} style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600,
              padding: "8px 16px", borderRadius: 8, border: `1px solid ${t.border}`,
              background: "transparent", color: t.text, cursor: "pointer",
            }}>Try Again</button>
          </div>
        )}

        {status === "preview" && preview && (
          <div>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: t.textSecondary, marginBottom: 12 }}>
              Found <strong>{preview.length}</strong> conversation{preview.length !== 1 ? "s" : ""}. Existing entries will be updated, new ones added.
            </p>
            <div style={{
              maxHeight: 200, overflowY: "auto", marginBottom: 16, borderRadius: 8,
              border: `1px solid ${t.border}`, background: t.bg,
            }}>
              {preview.slice(0, 20).map((e) => (
                <div key={e.id} style={{
                  padding: "8px 12px", borderBottom: `1px solid ${t.borderLight}`,
                  fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: t.text,
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                }}>{e.title}</div>
              ))}
              {preview.length > 20 && (
                <div style={{ padding: "8px 12px", fontSize: 12, color: t.textMuted, fontFamily: "'DM Sans', sans-serif" }}>
                  ...and {preview.length - 20} more
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { onImport(preview); onClose(); }} style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600,
                padding: "10px 20px", borderRadius: 8, border: "none",
                background: t.accent, color: "#fff", cursor: "pointer",
              }}>Import {preview.length} conversation{preview.length !== 1 ? "s" : ""}</button>
              <button onClick={onClose} style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 13, padding: "10px 20px",
                borderRadius: 8, border: `1px solid ${t.border}`, background: "transparent",
                color: t.textSecondary, cursor: "pointer",
              }}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

  const [gapiReady, setGapiReady] = useState(false);
  const [sortBy, setSortBy] = useState("updated");
  const [batchMode, setBatchMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [showBatchTags, setShowBatchTags] = useState(false);
  const [batchTagInput, setBatchTagInput] = useState("");
  const [confirmBatchDelete, setConfirmBatchDelete] = useState(false);
  const [showArchived, setShowArchived] = useState(false);

  const t = themes[theme];

  // Load settings from localStorage on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("cv2_settings");
      if (saved) {
        const s = JSON.parse(saved);
        if (s.theme) setTheme(s.theme);
        if (s.viewMode) setViewMode(s.viewMode);
        if (s.walkthroughDone) setShowWalkthrough(false);
        if (s.driveClientId) { setDriveClientId(s.driveClientId); setShowDriveSetup(false); }
        if (s.driveFileId) setDriveFileId(s.driveFileId);
      }

      // Load data from localStorage as fallback
      const localData = localStorage.getItem("cv2_data");
      if (localData) {
        setData(JSON.parse(localData));
      }
    } catch (e) { /* fresh start */ }
  }, []);

  // Save settings
  const saveSettings = useCallback((overrides = {}) => {
    try {
      const current = JSON.parse(localStorage.getItem("cv2_settings") || "{}");
      localStorage.setItem("cv2_settings", JSON.stringify({ ...current, ...overrides }));
    } catch (e) {}
  }, []);

  // Save data locally
  useEffect(() => {
    try { localStorage.setItem("cv2_data", JSON.stringify(data)); } catch (e) {}
  }, [data]);

  // Auto-sync: use refs so timers always have current values
  const dirtyRef = useRef(false);
  const syncTimeoutRef = useRef(null);
  const safetyIntervalRef = useRef(null);
  const dataRef = useRef(data);
  const driveStatusRef = useRef(driveStatus);
  const driveFileIdRef = useRef(driveFileId);

  // Keep refs current
  useEffect(() => { dataRef.current = data; }, [data]);
  useEffect(() => { driveStatusRef.current = driveStatus; }, [driveStatus]);
  useEffect(() => { driveFileIdRef.current = driveFileId; }, [driveFileId]);

  const doAutoSync = async () => {
    if (driveStatusRef.current !== "connected") return;
    if (!window.gapi?.client?.drive) return;
    try {
      // Find or create file
      let fileId = driveFileIdRef.current;
      if (!fileId) {
        const resp = await window.gapi.client.drive.files.list({
          q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
          spaces: "drive",
          fields: "files(id, name)",
        });
        if (resp.result.files?.length > 0) {
          fileId = resp.result.files[0].id;
        } else {
          const createResp = await window.gapi.client.drive.files.create({
            resource: { name: DRIVE_FILE_NAME, mimeType: "application/json" },
            fields: "id",
          });
          fileId = createResp.result.id;
        }
        setDriveFileId(fileId);
        driveFileIdRef.current = fileId;
        saveSettings({ driveFileId: fileId });
      }

      const boundary = "cv2boundary";
      const body = [
        `--${boundary}`,
        "Content-Type: application/json; charset=UTF-8",
        "",
        JSON.stringify({ name: DRIVE_FILE_NAME }),
        `--${boundary}`,
        "Content-Type: application/json",
        "",
        JSON.stringify(dataRef.current),
        `--${boundary}--`,
      ].join("\r\n");

      await window.gapi.client.request({
        path: `/upload/drive/v3/files/${fileId}`,
        method: "PATCH",
        params: { uploadType: "multipart" },
        headers: { "Content-Type": `multipart/related; boundary=${boundary}` },
        body,
      });
      dirtyRef.current = false;
      setSyncMessage("Auto-saved to Drive");
      setTimeout(() => setSyncMessage(""), 2000);
    } catch (e) {
      console.error("Auto-sync error", e);
    }
  };

  // Mark data as dirty when it changes (skip initial load)
  const initialLoadRef = useRef(true);
  useEffect(() => {
    if (initialLoadRef.current) {
      initialLoadRef.current = false;
      return;
    }
    dirtyRef.current = true;

    // Debounce: sync 30 seconds after last change
    if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
    syncTimeoutRef.current = setTimeout(() => {
      if (dirtyRef.current) {
        doAutoSync();
      }
    }, 30000);
  }, [data]);

  // 15-minute safety net
  useEffect(() => {
    safetyIntervalRef.current = setInterval(() => {
      if (dirtyRef.current) {
        doAutoSync();
      }
    }, 15 * 60 * 1000);
    return () => { if (safetyIntervalRef.current) clearInterval(safetyIntervalRef.current); };
  }, []);

  // Google Drive: load GIS + GAPI
  const tokenClientRef = useRef(null);
  const accessTokenRef = useRef(null);
  const tokenExpiryRef = useRef(0);

  const autoLoadFromDrive = async () => {
    try {
      // Find the file
      const resp = await window.gapi.client.drive.files.list({
        q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
        spaces: "drive",
        fields: "files(id, name)",
      });
      if (resp.result.files?.length > 0) {
        const fileId = resp.result.files[0].id;
        setDriveFileId(fileId);
        driveFileIdRef.current = fileId;
        saveSettings({ driveFileId: fileId });
        const fileResp = await window.gapi.client.drive.files.get({
          fileId,
          alt: "media",
        });
        if (fileResp.result?.entries) {
          setData(fileResp.result);
          initialLoadRef.current = true; // prevent auto-sync from triggering on load
          setSyncMessage("Loaded from Drive");
          setTimeout(() => setSyncMessage(""), 2000);
        }
      }
    } catch (e) {
      console.error("Auto-load from Drive error", e);
    }
  };

  useEffect(() => {
    if (!driveClientId) return;

    // Try to restore existing token from localStorage
    try {
      const stored = localStorage.getItem("cv2_auth");
      if (stored) {
        const { token, expiry } = JSON.parse(stored);
        if (token && expiry && Date.now() < expiry) {
          accessTokenRef.current = token;
          tokenExpiryRef.current = expiry;
        }
      }
    } catch (e) {}

    // Load GAPI for Drive API calls
    const gapiScript = document.createElement("script");
    gapiScript.src = "https://apis.google.com/js/api.js";
    gapiScript.onload = () => {
      window.gapi.load("client", async () => {
        try {
          await window.gapi.client.init({});
          await window.gapi.client.load("drive", "v3");
          setGapiReady(true);
          // Restore token if we have a valid one
          if (accessTokenRef.current && Date.now() < tokenExpiryRef.current) {
            window.gapi.client.setToken({ access_token: accessTokenRef.current });
            setDriveStatus("connected");
            // Auto-load from Drive on page open
            autoLoadFromDrive();
          }
        } catch (e) {
          console.error("GAPI client init error", e);
        }
      });
    };
    document.body.appendChild(gapiScript);

    // Load GIS for OAuth
    const gisScript = document.createElement("script");
    gisScript.src = "https://accounts.google.com/gsi/client";
    gisScript.onload = () => {
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: driveClientId,
        scope: SCOPES,
        callback: (response) => {
          if (response.access_token) {
            accessTokenRef.current = response.access_token;
            // Google tokens last 1 hour; store expiry with 5min buffer
            const expiry = Date.now() + (response.expires_in || 3600) * 1000 - 5 * 60 * 1000;
            tokenExpiryRef.current = expiry;
            try {
              localStorage.setItem("cv2_auth", JSON.stringify({
                token: response.access_token,
                expiry,
              }));
            } catch (e) {}
            window.gapi.client.setToken({ access_token: response.access_token });
            setDriveStatus("connected");
            setSyncMessage("Connected to Google Drive");
            setTimeout(() => setSyncMessage(""), 2000);
            // Auto-load from Drive after sign-in
            autoLoadFromDrive();
          }
        },
      });

      // Try silent refresh on load if we don't have a valid token
      if (!accessTokenRef.current || Date.now() >= tokenExpiryRef.current) {
        try {
          tokenClientRef.current.requestAccessToken({ prompt: "" });
        } catch (e) {
          // Silent refresh failed - user will need to click Sign In
        }
      }
    };
    document.body.appendChild(gisScript);
  }, [driveClientId]);

  // Auto-refresh token before expiry
  useEffect(() => {
    if (driveStatus !== "connected") return;
    const interval = setInterval(() => {
      if (Date.now() >= tokenExpiryRef.current - 60 * 1000) {
        // Token expiring in next minute - refresh silently
        if (tokenClientRef.current) {
          try { tokenClientRef.current.requestAccessToken({ prompt: "" }); } catch (e) {}
        }
      }
    }, 60 * 1000); // check every minute
    return () => clearInterval(interval);
  }, [driveStatus]);

  const driveSignIn = () => {
    if (tokenClientRef.current) {
      tokenClientRef.current.requestAccessToken();
    }
  };

  const findOrCreateDriveFile = async () => {
    if (driveFileId) return driveFileId;
    // Search for existing file
    const resp = await window.gapi.client.drive.files.list({
      q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
      spaces: "drive",
      fields: "files(id, name)",
    });
    if (resp.result.files?.length > 0) {
      const id = resp.result.files[0].id;
      setDriveFileId(id);
      saveSettings({ driveFileId: id });
      return id;
    }
    // Create new
    const createResp = await window.gapi.client.drive.files.create({
      resource: { name: DRIVE_FILE_NAME, mimeType: "application/json" },
      fields: "id",
    });
    const id = createResp.result.id;
    setDriveFileId(id);
    saveSettings({ driveFileId: id });
    return id;
  };

  const syncToDrive = async () => {
    if (driveStatus !== "connected") return;
    setSyncMessage("Saving to Drive...");
    try {
      const fileId = await findOrCreateDriveFile();
      const boundary = "cv2boundary";
      const body = [
        `--${boundary}`,
        "Content-Type: application/json; charset=UTF-8",
        "",
        JSON.stringify({ name: DRIVE_FILE_NAME }),
        `--${boundary}`,
        "Content-Type: application/json",
        "",
        JSON.stringify(data),
        `--${boundary}--`,
      ].join("\r\n");

      await window.gapi.client.request({
        path: `/upload/drive/v3/files/${fileId}`,
        method: "PATCH",
        params: { uploadType: "multipart" },
        headers: { "Content-Type": `multipart/related; boundary=${boundary}` },
        body,
      });
      setSyncMessage("Saved to Drive");
      dirtyRef.current = false;
      if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
      setTimeout(() => setSyncMessage(""), 2000);
    } catch (e) {
      console.error("Sync error", e);
      setSyncMessage("Sync failed");
      setTimeout(() => setSyncMessage(""), 3000);
    }
  };

  const loadFromDrive = async () => {
    if (driveStatus !== "connected") return;
    setSyncMessage("Loading from Drive...");
    try {
      const fileId = await findOrCreateDriveFile();
      const resp = await window.gapi.client.drive.files.get({
        fileId,
        alt: "media",
      });
      if (resp.result?.entries) {
        setData(resp.result);
        setSyncMessage("Loaded from Drive");
      } else {
        setSyncMessage("No data found in Drive — using local");
      }
      setTimeout(() => setSyncMessage(""), 2000);
    } catch (e) {
      console.error("Load error", e);
      setSyncMessage("Load failed");
      setTimeout(() => setSyncMessage(""), 3000);
    }
  };

  // All tags across all entries
  const allTags = useMemo(() => {
    const tagSet = new Set();
    data.entries.forEach((e) => e.tags.forEach((tag) => tagSet.add(tag)));
    return [...tagSet].sort();
  }, [data.entries]);

  // All types
  const allTypes = useMemo(() => {
    const typeSet = new Set(["All", ...data.customTypes]);
    data.entries.forEach((e) => typeSet.add(e.type));
    return [...typeSet];
  }, [data.entries, data.customTypes]);

  // Filtered and sorted entries
  const filtered = useMemo(() => {
    let entries = data.entries;
    // Filter archived
    entries = entries.filter((e) => showArchived ? (e.archived === true) : (!e.archived));
    if (search) {
      const q = search.toLowerCase();
      entries = entries.filter((e) =>
        e.title.toLowerCase().includes(q) ||
        e.notes.toLowerCase().includes(q) ||
        e.summary.toLowerCase().includes(q) ||
        e.tags.some((tag) => tag.toLowerCase().includes(q)) ||
        e.currentVersion.toLowerCase().includes(q)
      );
    }
    if (filterType !== "All") entries = entries.filter((e) => e.type === filterType);
    if (filterStage !== "All") entries = entries.filter((e) => e.stage === filterStage);
    if (filterTag !== "All") entries = entries.filter((e) => e.tags.includes(filterTag));

    entries = [...entries].sort((a, b) => {
      if (sortBy === "updated") return new Date(b.updatedAt) - new Date(a.updatedAt);
      if (sortBy === "worked") return (new Date(b.lastWorkedOn || 0)) - (new Date(a.lastWorkedOn || 0));
      if (sortBy === "title") return a.title.localeCompare(b.title);
      if (sortBy === "stage") return STAGES.indexOf(a.stage) - STAGES.indexOf(b.stage);
      return 0;
    });
    return entries;
  }, [data.entries, search, filterType, filterStage, filterTag, sortBy, showArchived]);

  // Handlers
  const handleImport = (importedEntries) => {
    setData((prev) => {
      const updated = { ...prev, lastUpdated: new Date().toISOString() };
      const existing = new Map(prev.entries.map((e) => [e.chatImportId, e]));
      const tombstones = new Set(prev.deletedImportIds || []);

      for (const imp of importedEntries) {
        // Skip previously deleted conversations
        if (tombstones.has(imp.chatImportId)) continue;

        const existingEntry = existing.get(imp.chatImportId);
        if (existingEntry) {
          // Merge: keep user's tags, stage, notes, revisions; update chat log
          const idx = updated.entries.findIndex((e) => e.id === existingEntry.id);
          if (idx >= 0) {
            updated.entries = [...updated.entries];
            updated.entries[idx] = {
              ...existingEntry,
              chatLog: imp.chatLog,
              summary: imp.summary || existingEntry.summary,
              updatedAt: imp.updatedAt,
            };
          }
        } else {
          updated.entries = [...updated.entries, imp];
        }
      }
      return updated;
    });
  };

  const handleSaveEntry = (updatedEntry) => {
    setData((prev) => {
      const idx = prev.entries.findIndex((e) => e.id === updatedEntry.id);
      const entries = [...prev.entries];
      const stamped = { ...updatedEntry, lastWorkedOn: new Date().toISOString() };
      if (idx >= 0) {
        entries[idx] = stamped;
      } else {
        entries.push(stamped);
      }
      return { ...prev, entries, lastUpdated: new Date().toISOString() };
    });
  };

  const handleDeleteEntry = (id) => {
    setData((prev) => {
      const entry = prev.entries.find((e) => e.id === id);
      const newDeletedIds = [...(prev.deletedImportIds || [])];
      if (entry?.chatImportId) newDeletedIds.push(entry.chatImportId);
      return {
        ...prev,
        entries: prev.entries.filter((e) => e.id !== id),
        deletedImportIds: newDeletedIds,
        lastUpdated: new Date().toISOString(),
      };
    });
  };

  const handleNewEntry = () => {
    const entry = createEntry({ title: "New Idea" });
    setData((prev) => ({ ...prev, entries: [entry, ...prev.entries] }));
    setSelectedEntry(entry);
  };

  const handleExportBackup = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `creative-vault-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImportBackup = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      try {
        const parsed = JSON.parse(text);
        if (parsed.entries) {
          setData(parsed);
          setSyncMessage("Backup restored");
          setTimeout(() => setSyncMessage(""), 2000);
        }
      } catch (err) { setSyncMessage("Invalid backup file"); setTimeout(() => setSyncMessage(""), 2000); }
    };
    input.click();
  };

  // Batch operations
  const toggleSelect = (id) => {
    setSelected((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const selectAllVisible = () => {
    if (selected.size === filtered.length) {
      setSelected(new Set());
    } else {
      setSelected(new Set(filtered.map((e) => e.id)));
    }
  };

  const batchSetType = (type) => {
    setData((prev) => ({
      ...prev,
      entries: prev.entries.map((e) =>
        selected.has(e.id) ? { ...e, type, updatedAt: new Date().toISOString() } : e
      ),
      lastUpdated: new Date().toISOString(),
    }));
  };

  const batchSetStage = (stage) => {
    setData((prev) => ({
      ...prev,
      entries: prev.entries.map((e) =>
        selected.has(e.id) ? { ...e, stage, updatedAt: new Date().toISOString() } : e
      ),
      lastUpdated: new Date().toISOString(),
    }));
  };

  const batchAddTag = (tag) => {
    const trimmed = tag.trim();
    if (!trimmed) return;
    setData((prev) => ({
      ...prev,
      entries: prev.entries.map((e) =>
        selected.has(e.id) && !e.tags.includes(trimmed)
          ? { ...e, tags: [...e.tags, trimmed], updatedAt: new Date().toISOString() }
          : e
      ),
      lastUpdated: new Date().toISOString(),
    }));
    setBatchTagInput("");
    setShowBatchTags(false);
  };

  const batchDelete = () => {
    setData((prev) => {
      const newDeletedIds = [...(prev.deletedImportIds || [])];
      prev.entries.forEach((e) => {
        if (selected.has(e.id) && e.chatImportId) newDeletedIds.push(e.chatImportId);
      });
      return {
        ...prev,
        entries: prev.entries.filter((e) => !selected.has(e.id)),
        deletedImportIds: newDeletedIds,
        lastUpdated: new Date().toISOString(),
      };
    });
    setSelected(new Set());
    setConfirmBatchDelete(false);
  };

  const exitBatchMode = () => {
    setBatchMode(false);
    setSelected(new Set());
    setConfirmBatchDelete(false);
    setShowBatchTags(false);
  };

  const batchArchive = () => {
    setData((prev) => ({
      ...prev,
      entries: prev.entries.map((e) =>
        selected.has(e.id) ? { ...e, archived: true, updatedAt: new Date().toISOString() } : e
      ),
      lastUpdated: new Date().toISOString(),
    }));
    setSelected(new Set());
  };

  const batchUnarchive = () => {
    setData((prev) => ({
      ...prev,
      entries: prev.entries.map((e) =>
        selected.has(e.id) ? { ...e, archived: false, updatedAt: new Date().toISOString() } : e
      ),
      lastUpdated: new Date().toISOString(),
    }));
    setSelected(new Set());
  };

  const isMobile = typeof window !== "undefined" && window.innerWidth < 640;

  // Stats
  const stats = useMemo(() => ({
    total: data.entries.filter((e) => !e.archived).length,
    songs: data.entries.filter((e) => e.type === "Song" && !e.archived).length,
    comedy: data.entries.filter((e) => e.type === "Comedy Bit" && !e.archived).length,
    done: data.entries.filter((e) => e.stage === "Done" && !e.archived).length,
    seeds: data.entries.filter((e) => e.stage === "Seed" && !e.archived).length,
    archived: data.entries.filter((e) => e.archived).length,
  }), [data.entries]);

  return (
    <div style={{
      minHeight: "100vh", background: t.bg, color: t.text,
      fontFamily: "'DM Sans', sans-serif", transition: "background 0.3s ease, color 0.3s ease",
    }}>
      {showWalkthrough && (
        <Walkthrough theme={theme} onComplete={() => {
          setShowWalkthrough(false);
          saveSettings({ walkthroughDone: true });
          if (!driveClientId) setShowDriveSetup(true);
        }} />
      )}

      {showDriveSetup && (
        <DriveSetup theme={theme} onComplete={(id) => {
          setShowDriveSetup(false);
          if (id) {
            setDriveClientId(id);
            saveSettings({ driveClientId: id });
          }
        }} />
      )}

      {showImport && <ImportModal onImport={handleImport} onClose={() => setShowImport(false)} theme={theme} />}

      {selectedEntry && (
        <EntryDetail
          entry={selectedEntry}
          allTags={allTags}
          onSave={handleSaveEntry}
          onDelete={handleDeleteEntry}
          onClose={() => setSelectedEntry(null)}
          theme={theme}
        />
      )}

      {/* Header */}
      <header style={{
        padding: isMobile ? "16px 16px 12px" : "20px 28px 16px",
        borderBottom: `1px solid ${t.border}`,
        background: t.bgSecondary,
      }}>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14,
          flexWrap: "wrap", gap: 10,
        }}>
          <div>
            <h1 style={{
              fontFamily: "'Playfair Display', serif", fontSize: isMobile ? 24 : 28,
              fontWeight: 800, margin: 0, color: t.text,
            }}>Creative Vault</h1>
            <p style={{ fontSize: 12, color: t.textMuted, margin: "2px 0 0" }}>
              {stats.total} entries &middot; {stats.songs} songs &middot; {stats.comedy} bits &middot; {stats.done} done
              {stats.archived > 0 && <> &middot; {stats.archived} archived</>}
            </p>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            {syncMessage && (
              <span style={{
                fontSize: 11, color: t.success, fontWeight: 500,
                display: "flex", alignItems: "center", gap: 4,
              }}>{Icons.check({ size: 13, color: t.success })} {syncMessage}</span>
            )}
            {driveStatus === "connected" ? (
              <button onClick={syncToDrive} title="Save to Drive" style={{
                padding: "7px 12px", borderRadius: 8, border: `1px solid ${t.border}`,
                background: "transparent", cursor: "pointer", color: t.success,
                display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 500,
              }}>{Icons.cloud({ size: 15 })} Sync</button>
            ) : driveClientId ? (
              <button onClick={driveSignIn} style={{
                padding: "7px 12px", borderRadius: 8, border: `1px solid ${t.border}`,
                background: "transparent", cursor: "pointer", color: t.textSecondary,
                display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 500,
              }}>{Icons.drive({ size: 15 })} Sign In</button>
            ) : (
              <button onClick={() => setShowDriveSetup(true)} style={{
                padding: "7px 12px", borderRadius: 8, border: `1px solid ${t.border}`,
                background: "transparent", cursor: "pointer", color: t.textSecondary,
                display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 500,
              }}>{Icons.drive({ size: 15 })} Setup Drive</button>
            )}
            <button onClick={() => { const newTheme = theme === "light" ? "dark" : "light"; setTheme(newTheme); saveSettings({ theme: newTheme }); }} style={{
              padding: 7, borderRadius: 8, border: `1px solid ${t.border}`,
              background: "transparent", cursor: "pointer", color: t.textSecondary,
              display: "flex", alignItems: "center",
            }}>{theme === "light" ? Icons.moon({ size: 15 }) : Icons.sun({ size: 15 })}</button>
          </div>
        </div>

        {/* Actions bar */}
        <div style={{
          display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center",
        }}>
          <button onClick={handleNewEntry} style={{
            padding: "8px 14px", borderRadius: 8, border: "none",
            background: t.accent, color: "#fff", cursor: "pointer",
            display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600,
          }}>{Icons.plus({ size: 15 })} New Entry</button>
          <button onClick={() => setShowImport(true)} style={{
            padding: "8px 14px", borderRadius: 8, border: `1px solid ${t.border}`,
            background: "transparent", color: t.text, cursor: "pointer",
            display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 500,
          }}>{Icons.upload({ size: 15 })} Import Chats</button>
          <button onClick={handleExportBackup} style={{
            padding: "8px 14px", borderRadius: 8, border: `1px solid ${t.border}`,
            background: "transparent", color: t.textSecondary, cursor: "pointer",
            display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
          }}>{Icons.download({ size: 14 })} Backup</button>
          <button onClick={handleImportBackup} style={{
            padding: "8px 14px", borderRadius: 8, border: `1px solid ${t.border}`,
            background: "transparent", color: t.textSecondary, cursor: "pointer",
            display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
          }}>{Icons.upload({ size: 14 })} Restore</button>
          {data.entries.length > 0 && (
            <button onClick={() => batchMode ? exitBatchMode() : setBatchMode(true)} style={{
              padding: "8px 14px", borderRadius: 8,
              border: batchMode ? `2px solid ${t.accent}` : `1px solid ${t.border}`,
              background: batchMode ? t.accentLight : "transparent",
              color: batchMode ? t.accent : t.textSecondary, cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: batchMode ? 600 : 500,
            }}>{Icons.check({ size: 14 })} {batchMode ? "Exit Select" : "Select"}</button>
          )}
          {driveStatus === "connected" && (
            <button onClick={loadFromDrive} style={{
              padding: "8px 14px", borderRadius: 8, border: `1px solid ${t.border}`,
              background: "transparent", color: t.textSecondary, cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
            }}>{Icons.download({ size: 14 })} Load from Drive</button>
          )}
        </div>
      </header>

      {/* Filters */}
      <div style={{
        padding: isMobile ? "12px 16px" : "14px 28px",
        borderBottom: `1px solid ${t.border}`, background: t.bgSecondary,
        display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center",
      }}>
        <div style={{
          flex: 1, minWidth: 180, display: "flex", alignItems: "center", gap: 8,
          padding: "8px 12px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg,
        }}>
          {Icons.search({ size: 15, color: t.textMuted })}
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search titles, notes, tags, content..."
            style={{
              border: "none", outline: "none", background: "transparent", flex: 1,
              fontSize: 13, color: t.text, fontFamily: "'DM Sans', sans-serif",
            }}
          />
          {search && (
            <button onClick={() => setSearch("")} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 0 }}>
              {Icons.x({ size: 14 })}
            </button>
          )}
        </div>

        <select value={filterType} onChange={(e) => setFilterType(e.target.value)} style={{
          fontSize: 12, padding: "8px 10px", borderRadius: 8, border: `1px solid ${t.border}`,
          background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
        }}>
          {allTypes.map((tp) => <option key={tp} value={tp}>{tp}</option>)}
        </select>

        <select value={filterStage} onChange={(e) => setFilterStage(e.target.value)} style={{
          fontSize: 12, padding: "8px 10px", borderRadius: 8, border: `1px solid ${t.border}`,
          background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
        }}>
          <option value="All">All Stages</option>
          {STAGES.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>

        {allTags.length > 0 && (
          <select value={filterTag} onChange={(e) => setFilterTag(e.target.value)} style={{
            fontSize: 12, padding: "8px 10px", borderRadius: 8, border: `1px solid ${t.border}`,
            background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
          }}>
            <option value="All">All Tags</option>
            {allTags.map((tag) => <option key={tag} value={tag}>{tag}</option>)}
          </select>
        )}

        <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{
          fontSize: 12, padding: "8px 10px", borderRadius: 8, border: `1px solid ${t.border}`,
          background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
        }}>
          <option value="updated">Last Updated</option>
          <option value="worked">Last Worked On</option>
          <option value="title">Title A-Z</option>
          <option value="stage">Stage</option>
        </select>

        {(stats.archived > 0 || showArchived) && (
          <button onClick={() => setShowArchived(!showArchived)} style={{
            fontSize: 12, padding: "8px 10px", borderRadius: 8,
            border: showArchived ? `2px solid ${t.accent}` : `1px solid ${t.border}`,
            background: showArchived ? t.accentLight : "transparent",
            color: showArchived ? t.accent : t.textSecondary,
            fontFamily: "'DM Sans', sans-serif", cursor: "pointer", fontWeight: showArchived ? 600 : 400,
          }}>{showArchived ? "Back to Vault" : `Archive (${stats.archived})`}</button>
        )}

        <div style={{ display: "flex", gap: 2, marginLeft: "auto" }}>
          <button onClick={() => { setViewMode("grid"); saveSettings({ viewMode: "grid" }); }} style={{
            padding: 7, borderRadius: "8px 0 0 8px", border: `1px solid ${t.border}`,
            background: viewMode === "grid" ? t.bgTertiary : "transparent",
            color: viewMode === "grid" ? t.text : t.textMuted, cursor: "pointer",
          }}>{Icons.grid({ size: 15 })}</button>
          <button onClick={() => { setViewMode("list"); saveSettings({ viewMode: "list" }); }} style={{
            padding: 7, borderRadius: "0 8px 8px 0", border: `1px solid ${t.border}`, borderLeft: "none",
            background: viewMode === "list" ? t.bgTertiary : "transparent",
            color: viewMode === "list" ? t.text : t.textMuted, cursor: "pointer",
          }}>{Icons.list({ size: 15 })}</button>
        </div>
      </div>

      {/* Content */}
      <main style={{
        padding: isMobile ? "16px" : "20px 28px",
        maxWidth: 1200, margin: "0 auto",
      }}>
        {/* Batch Action Bar */}
        {batchMode && (
          <div style={{
            padding: "12px 16px", borderRadius: 10, marginBottom: 16,
            background: t.bgSecondary, border: `1px solid ${t.accent}40`,
            display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center",
          }}>
            <button onClick={selectAllVisible} style={{
              padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600,
              border: `1px solid ${t.border}`, background: selected.size === filtered.length && filtered.length > 0 ? t.accentLight : "transparent",
              color: t.text, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
            }}>{selected.size === filtered.length && filtered.length > 0 ? "Deselect All" : "Select All"}</button>

            <span style={{ fontSize: 12, color: t.textMuted, fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>
              {selected.size} selected
            </span>

            <div style={{ width: 1, height: 20, background: t.border, margin: "0 4px" }} />

            {selected.size > 0 && (
              <>
                <select onChange={(e) => { if (e.target.value) { batchSetType(e.target.value); e.target.value = ""; } }} defaultValue="" style={{
                  fontSize: 12, padding: "6px 8px", borderRadius: 6, border: `1px solid ${t.border}`,
                  background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
                }}>
                  <option value="" disabled>Set Type...</option>
                  <option value="Song">Song</option>
                  <option value="Comedy Bit">Comedy Bit</option>
                </select>

                <select onChange={(e) => { if (e.target.value) { batchSetStage(e.target.value); e.target.value = ""; } }} defaultValue="" style={{
                  fontSize: 12, padding: "6px 8px", borderRadius: 6, border: `1px solid ${t.border}`,
                  background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
                }}>
                  <option value="" disabled>Set Stage...</option>
                  {STAGES.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>

                <div style={{ position: "relative" }}>
                  <button onClick={() => setShowBatchTags(!showBatchTags)} style={{
                    padding: "6px 10px", borderRadius: 6, fontSize: 12, fontWeight: 500,
                    border: `1px solid ${t.border}`, background: showBatchTags ? t.accentLight : "transparent",
                    color: t.text, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    display: "flex", alignItems: "center", gap: 4,
                  }}>{Icons.tag({ size: 12 })} Add Tag</button>
                  {showBatchTags && (
                    <div style={{
                      position: "absolute", top: "100%", left: 0, zIndex: 20, marginTop: 4,
                      background: t.bgSecondary, border: `1px solid ${t.border}`, borderRadius: 8,
                      padding: 8, boxShadow: t.shadowHover, minWidth: 200,
                    }}>
                      <div style={{ display: "flex", gap: 4 }}>
                        <input
                          value={batchTagInput}
                          onChange={(e) => setBatchTagInput(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") batchAddTag(batchTagInput); }}
                          placeholder="Type tag name..."
                          autoFocus
                          style={{
                            flex: 1, padding: "6px 8px", borderRadius: 6, border: `1px solid ${t.border}`,
                            background: t.bg, color: t.text, fontFamily: "'DM Sans', sans-serif", fontSize: 12, outline: "none",
                          }}
                        />
                        <button onClick={() => batchAddTag(batchTagInput)} style={{
                          padding: "6px 10px", borderRadius: 6, border: "none", fontSize: 11, fontWeight: 600,
                          background: t.accent, color: "#fff", cursor: "pointer",
                        }}>Add</button>
                      </div>
                      {allTags.length > 0 && (
                        <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 3 }}>
                          {allTags.slice(0, 10).map((tag) => (
                            <button key={tag} onClick={() => batchAddTag(tag)} style={{
                              padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 500, cursor: "pointer",
                              background: t.tagBg, color: t.tagText, border: "none", fontFamily: "'DM Sans', sans-serif",
                            }}>{tag}</button>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div style={{ marginLeft: "auto" }} />

                {!showArchived ? (
                  <button onClick={batchArchive} style={{
                    padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 500,
                    border: `1px solid ${t.border}`, background: "transparent",
                    color: t.textSecondary, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    display: "flex", alignItems: "center", gap: 4,
                  }}>{Icons.download({ size: 12 })} Archive {selected.size}</button>
                ) : (
                  <button onClick={batchUnarchive} style={{
                    padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 500,
                    border: `1px solid ${t.accent}40`, background: "transparent",
                    color: t.accent, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    display: "flex", alignItems: "center", gap: 4,
                  }}>{Icons.upload({ size: 12 })} Unarchive {selected.size}</button>
                )}

                {!confirmBatchDelete ? (
                  <button onClick={() => setConfirmBatchDelete(true)} style={{
                    padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 500,
                    border: `1px solid #C4444440`, background: "transparent",
                    color: "#C44", cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    display: "flex", alignItems: "center", gap: 4,
                  }}>{Icons.trash({ size: 12 })} Delete {selected.size}</button>
                ) : (
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#C44", fontFamily: "'DM Sans', sans-serif" }}>Delete {selected.size} entries?</span>
                    <button onClick={batchDelete} style={{
                      padding: "6px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600,
                      border: "none", background: "#C44", color: "#fff", cursor: "pointer",
                    }}>Yes</button>
                    <button onClick={() => setConfirmBatchDelete(false)} style={{
                      padding: "6px 10px", borderRadius: 6, fontSize: 11,
                      border: `1px solid ${t.border}`, background: "transparent",
                      color: t.textSecondary, cursor: "pointer",
                    }}>No</button>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {filtered.length === 0 ? (
          <div style={{
            textAlign: "center", padding: "60px 20px",
          }}>
            {data.entries.length === 0 ? (
              <>
                <div style={{
                  width: 64, height: 64, borderRadius: 16, background: t.accentLight,
                  display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16,
                }}>{Icons.music({ size: 28, color: t.accent })}</div>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700, color: t.text, margin: "0 0 8px" }}>
                  Your Vault is Empty
                </h3>
                <p style={{ fontSize: 14, color: t.textSecondary, maxWidth: 360, margin: "0 auto 20px", lineHeight: 1.6 }}>
                  Create your first entry or import your Claude chat export to get started.
                </p>
                <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                  <button onClick={handleNewEntry} style={{
                    padding: "10px 20px", borderRadius: 8, border: "none",
                    background: t.accent, color: "#fff", cursor: "pointer",
                    fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 6,
                  }}>{Icons.plus({ size: 16 })} New Entry</button>
                  <button onClick={() => setShowImport(true)} style={{
                    padding: "10px 20px", borderRadius: 8, border: `1px solid ${t.border}`,
                    background: "transparent", color: t.text, cursor: "pointer",
                    fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 6,
                  }}>{Icons.upload({ size: 16 })} Import Chats</button>
                </div>
              </>
            ) : (
              <>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, color: t.text, margin: "0 0 8px" }}>No matches</h3>
                <p style={{ fontSize: 14, color: t.textSecondary }}>Try adjusting your filters or search.</p>
              </>
            )}
          </div>
        ) : (
          <div style={{
            display: "grid",
            gridTemplateColumns: viewMode === "grid"
              ? `repeat(auto-fill, minmax(${isMobile ? "100%" : "280px"}, 1fr))`
              : "1fr",
            gap: viewMode === "grid" ? 12 : 8,
          }}>
            {filtered.map((entry) => (
              <EntryCard
                key={entry.id}
                entry={entry}
                onClick={() => setSelectedEntry(entry)}
                viewMode={viewMode}
                theme={theme}
                batchMode={batchMode}
                isSelected={selected.has(entry.id)}
                onToggleSelect={toggleSelect}
              />
            ))}
          </div>
        )}
      </main>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CreativeVault />);
  </script>
</body>
</html>
